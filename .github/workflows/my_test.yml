name: Arduino CLI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  get_lib_info:
    runs-on: ubuntu-latest

    outputs:
      lib_name: ${{ steps.get_lib_name.outputs.lib_name }}
      examples: ${{ steps.get_examples.outputs.examples }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: get lib name
        id: get_lib_name
        run: |
          LIB_NAME=$(python script/get_lib_name.py)
          echo "lib_name=${LIB_NAME}"
          echo "lib_name=${LIB_NAME}" >> "$GITHUB_OUTPUT"
      - name: get examples
        id: get_examples
        run: |
          EXAMPLES=$(python script/get_examples.py)
          echo "examples=${EXAMPLES}"
          echo "examples=${EXAMPLES}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: get_lib_info
    env:
      ARDUINO_LIB_NAME: ${{ needs.get_lib_info.outputs.lib_name }}
    strategy:
      matrix:
        example: ${{ fromJSON(needs.get_lib_info.outputs.examples) }}
        cores: ["arduino:avr", "esp32:esp32"]
        include:
          - core: "arduino:avr"
            fqbn: "arduino:avr:uno"
          - core: "esp32:esp32"
            fqbn: "esp32:esp32:esp32"

    steps:
    - name: download arduino cli
      run: curl -L -o arduino-cli.tar.gz https://github.com/arduino/arduino-cli/releases/download/v1.1.1/arduino-cli_1.1.1_Linux_64bit.tar.gz
    - name: install arduino cli
      run: tar -zxvf arduino-cli.tar.gz
    - name: test arduino cli
      run: ./arduino-cli -v
    - name: setup arduino-cli
      run: |
        ./arduino-cli --config-dir ./arduino_ci config init
        ./arduino-cli --config-dir ./arduino_ci config set directories.user `pwd`/arduino_ci
        ./arduino-cli --config-dir ./arduino_ci config set library.enable_unsafe_install true
        ./arduino-cli --config-dir ./arduino_ci config set build_cache.path `pwd`/arduino_ci/build_cache
        ./arduino-cli --config-dir ./arduino_ci config dump
        ./arduino-cli --config-dir ./arduino_ci core install ${{matrix.core}}
    - name: install lib
      run: |
        ./arduino-cli --config-dir ./arduino_ci lib install --git-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
    - name: compile
      run: |
        echo "compile ./arduino_ci/libraries/${ARDUINO_LIB_NAME}/examples/${{matrix.example}}/${{matrix.example}}.ino"
        ./arduino-cli --config-dir ./arduino_ci compile --fqbn ${{matrix.fqbn}} ./arduino_ci/libraries/${ARDUINO_LIB_NAME}/examples/${{matrix.example}}/${{matrix.example}}.ino --log --clean -v --verify

