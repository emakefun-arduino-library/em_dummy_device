name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  get-lib-info:
    runs-on: ubuntu-latest

    outputs:
      lib_name: ${{ steps.get_lib_name.outputs.LIB_NAME }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: get lib name
        id: get_lib_name
        run: |
          LIB_NAME=$(python script/get_lib_name.py)
          echo "LIB_NAME=${LIB_NAME}"
          echo "lib_name=${LIB_NAME}" >> "$GITHUB_OUTPUT"

  build:

    runs-on: ubuntu-latest
    needs: get-lib-info
    env:
      ARDUINO_LIB_NAME: ${{ needs.get-lib-info.outputs.lib_name }}
    strategy:
      matrix:
        examples: ["motor_forward_backward"]

    steps:
    - name: download arduino cli
      run: curl -L -o arduino-cli.tar.gz https://github.com/arduino/arduino-cli/releases/download/v1.1.1/arduino-cli_1.1.1_Linux_64bit.tar.gz
    - name: install arduino cli
      run: tar -zxvf arduino-cli.tar.gz
    - name: test arduino cli
      run: ./arduino-cli -v
    - name: test
      run: |
        echo "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
        echo "--------------------config init--------------------"
        ./arduino-cli --config-dir ./arduino_ci config init -v
        ./arduino-cli --config-dir ./arduino_ci config set directories.user `pwd`/arduino_ci -v
        ./arduino-cli --config-dir ./arduino_ci config set library.enable_unsafe_install true -v
        ./arduino-cli --config-dir ./arduino_ci config set build_cache.path `pwd`/arduino_ci/build_cache -v
        echo "--------------------config dump--------------------"
        ./arduino-cli --config-dir ./arduino_ci config dump -v
        ./arduino-cli --config-dir ./arduino_ci core install arduino:avr -v
        echo "--------------------lib install--------------------"
        ./arduino-cli --config-dir ./arduino_ci lib install --git-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" -v
        echo "--------------------compile--------------------"
        find ./arduino_ci/libraries/ -name "*.ino"
    - name: compile
      run: |
        echo "compile ./arduino_ci/libraries/${ARDUINO_LIB_NAME}/examples/${{matrix.examples}}/${{matrix.examples}}.ino"
        ./arduino-cli --config-dir ./arduino_ci compile --fqbn arduino:avr:uno ./arduino_ci/libraries/${ARDUINO_LIB_NAME}/examples/${{matrix.examples}}/${{matrix.examples}}.ino --log --clean -v --verify
        
